<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ideal Weight Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body {
      height: 100vh;
      background: url('https://www.recime.app/blog/wp-content/uploads/2025/05/Best-Weight-Tracker-Apps-to-Help-You-Reach-Your-Goals-in-2025-2.png') no-repeat center center / cover;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      padding-top: 50px;
      position: relative;
    }
    .back-btn {
      position: fixed;
      top: 15px;
      left: 15px;
      background: rgba(0,0,0,0.6);
      color: white;
      border: none;
      border-radius: 20px;
      padding: 8px 15px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      z-index: 1000;
      transition: background 0.3s;
    }
    .back-btn:hover {
      background: rgba(0,0,0,0.8);
    }
    .container {
      background: rgba(0,0,0,0.6);
      display: flex;
      flex-direction: row;
      width: 90%;
      max-width: 900px;
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(0,0,0,0.7);
      overflow: hidden;
    }
    .left, .right {
      flex: 1;
      padding: 40px;
    }
    .left h2 { margin-bottom: 20px; text-align: center; }
    label { display: block; margin-top: 15px; }
    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 5px;
      border: none;
      border-radius: 8px;
      background: rgba(255,255,255,0.2);
      color: white;
      font-size: 16px;
    }
    button {
      width: 100%;
      margin-top: 25px;
      padding: 12px;
      font-size: 16px;
      border: none;
      border-radius: 25px;
      background-color: #00bfff;
      color: white;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    button:hover {
      background-color: #008ecc;
    }
    .result {
      font-size: 22px;
      text-align: center;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .indicator {
      width: 100%;
      height: 20px;
      background: linear-gradient(to right, #00ffcc, #00ff00, #ffaa00, #ff0000);
      border-radius: 10px;
      margin: 20px 0;
      position: relative;
    }
    .indicator-line {
      position: absolute;
      top: -10px;
      width: 3px;
      height: 40px;
      background: white;
      display: none;
      transform: translateX(-50%);
    }
    .categories {
      border-top: 1px solid rgba(255,255,255,0.2);
      padding-top: 15px;
    }
    .categories h3 { text-align: center; margin-bottom: 10px; }
    .categories ul { list-style: none; padding: 0 10px; }
    .categories li { margin-bottom: 5px; font-size: 14px; }
    @media(max-width:768px){
      .container{flex-direction:column;}
      .left, .right{padding:30px;}
    }/* Select dropdown opened options styling */
select option {
  background-color: rgba(0,0,0,0.9); /* Darker so text visible */
  color: white;
}
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"/>
</head>
<body>
  <button class="back-btn" onclick="window.location.href='hanannanana.html'">
    <i class="fas fa-arrow-left"></i> Dashboard
  </button>

  <div class="container">
    <div class="left">
      <h2>Ideal Weight Calculator</h2>
      <label>Gender:</label>
      <select id="gender">
        <option value="male">Male</option>
        <option value="female">Female</option>
      </select>
      <label>Height (meters):</label>
      <input type="number" id="height" placeholder="e.g. 1.75">
      <button onclick="calculateIdealWeight()">Calculate Ideal Weight</button>
    </div>
    <div class="right">
      <div class="result" id="result">Enter details to see ideal weight</div>
      <div class="indicator" id="indicator">
        <div class="indicator-line" id="indicatorLine"></div>
      </div>
      <div class="categories">
        <h3>Information:</h3>
        <ul>
          <li>Male formula: 50kg + 2.3kg per inch over 5 feet</li>
          <li>Female formula: 45.5kg + 2.3kg per inch over 5 feet</li>
          <li>Note: Estimates only. Consult a professional.</li>
        </ul>
      </div>
    </div>
  </div>

  <script>
    function calculateIdealWeight() {
      const gender = document.getElementById("gender").value;
      const heightM = parseFloat(document.getElementById("height").value);
      const result = document.getElementById("result");
      const line = document.getElementById("indicatorLine");

      if (!heightM || heightM <= 0) {
        result.textContent = "Please enter valid height.";
        line.style.display = "none";
        return;
      }

      const heightCm = heightM * 100;
      let idealWeight;

      if (gender === "male") {
        if (heightCm > 152.4) {
          idealWeight = 50 + 2.3 * ((heightCm - 152.4) / 2.54);
        } else {
          idealWeight = 50;
        }
      } else {
        if (heightCm > 152.4) {
          idealWeight = 45.5 + 2.3 * ((heightCm - 152.4) / 2.54);
        } else {
          idealWeight = 45.5;
        }
      }

      result.innerHTML = `
        <div>Ideal Weight: <strong>${idealWeight.toFixed(1)} kg</strong></div>
        <div>Based on your height and gender</div>
      `;

      // Indicator position (up to 100kg)
      let position = (idealWeight / 100) * 100;
      if (position > 100) position = 100;

      line.style.left = position + "%";
      line.style.display = "block";
    }
  </script>
</body>
</html>
