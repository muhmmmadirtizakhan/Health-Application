<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Lean Body Mass - Health Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}
body {
  height: 100vh;
  background: url('bgjy.jpg') no-repeat center center fixed;
  background-size: cover;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  padding-top: 50px;
}
.back-btn {
  position: fixed;
  top: 15px;
  left: 15px;
  background: rgba(0,0,0,0.7);
  color: white;
  border: none;
  border-radius: 20px;
  padding: 8px 15px;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  z-index: 1000;
}
.back-btn:hover {
  background: rgba(0,0,0,0.9);
}
.back-btn i {
  margin-right: 5px;
}
.container {
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(15px);
  display: flex;
  flex-direction: row;
  width: 90%;
  max-width: 900px;
  border-radius: 20px;
  box-shadow: 0 0 30px rgba(0,0,0,0.6);
  overflow: hidden;
  margin-top: 20px;
}
.left {
  flex: 1;
  padding: 40px;
}
.left h2 {
  margin-bottom: 20px;
  text-align: center;
}
label {
  display: block;
  margin-top: 15px;
  font-size: 16px;
}
input, select {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  border: none;
  border-radius: 8px;
  background-color: rgba(255,255,255,0.2);
  color: white;
  font-size: 16px;
}
button {
  width: 100%;
  margin-top: 25px;
  padding: 12px;
  font-size: 16px;
  border: none;
  border-radius: 25px;
  background-color: #00bfff;
  color: white;
  cursor: pointer;
  transition: background-color 0.3s;
}
button:hover {
  background-color: #008ecc;
}
.right {
  flex: 1;
  padding: 40px;
  display: flex;
  flex-direction: column;
  background: rgba(255,255,255,0.05);
}
.result {
  font-size: 22px;
  margin-bottom: 15px;
  text-align: center;
  min-height: 120px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.bmi-scale {
  width: 100%;
  height: 20px;
  background: linear-gradient(to right, #00ffcc, #00ff00, #ffaa00, #ff0000);
  border-radius: 10px;
  margin: 15px 0;
  position: relative;
}
.bmi-indicator {
  position: absolute;
  top: -10px;
  width: 3px;
  height: 40px;
  background-color: white;
  transform: translateX(-50%);
  display: none;
}
.categories {
  width: 100%;
  border-top: 1px solid rgba(255,255,255,0.2);
  padding-top: 15px;
}
.categories h3 {
  margin-bottom: 10px;
  text-align: center;
  font-size: 18px;
}
.category-list {
  list-style-type: none;
  padding: 0 10px;
}
.category-list li {
  margin-bottom: 5px;
  font-size: 14px;
}
@media(max-width: 768px){
  .container {
    flex-direction: column;
  }
  .left, .right {
    padding: 30px;
  }
}
/* Select dropdown opened options styling */
select option {
  background-color: rgba(0,0,0,0.9); /* Darker so text visible */
  color: white;
}

</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<button class="back-btn" onclick="window.location.href='hanannanana.html'">
  <i class="fas fa-arrow-left"></i> Dashboard
</button>
<div class="container">
  <div class="left">
    <h2>Lean Body Mass</h2>
    <label>Gender:</label>
    <select id="gender">
      <option value="male">Male</option>
      <option value="female">Female</option>
    </select>
    <label>Weight (kg):</label>
    <input type="number" id="weight" placeholder="e.g. 70">
    <label>Height (meters):</label>
    <input type="number" id="height" placeholder="e.g. 1.75">
    <button onclick="calculateLBM()">Calculate LBM</button>
  </div>
  <div class="right">
    <div class="result" id="result">Enter your details to calculate Lean Body Mass</div>
    <div class="bmi-scale" id="bmiScale">
      <div class="bmi-indicator" id="bmiIndicator"></div>
    </div>
    <div class="categories">
      <h3>What Does It Mean?</h3>
      <ul class="category-list">
        <li>Lean Body Mass = Body weight without fat mass.</li>
        <li>Higher LBM indicates more muscle and bone mass.</li>
        <li>Helps in planning diet and workouts.</li>
        <li>Use it to monitor progress in fitness goals.</li>
      </ul>
    </div>
  </div>
</div>
<script>
function calculateLBM(){
  const gender = document.getElementById("gender").value;
  const weight = parseFloat(document.getElementById("weight").value);
  const height = parseFloat(document.getElementById("height").value);
  const resultDiv = document.getElementById("result");
  const bmiIndicator = document.getElementById("bmiIndicator");

  if(!weight || !height){
    resultDiv.textContent = "Please enter valid values!";
    bmiIndicator.style.display = "none";
    return;
  }

  const heightCm = height * 100;
  let lbm;
  if(gender === "male"){
    lbm = (0.407 * weight) + (0.267 * heightCm) - 19.2;
  } else {
    lbm = (0.252 * weight) + (0.473 * heightCm) - 48.3;
  }

  resultDiv.innerHTML = `Your Lean Body Mass is <strong>${lbm.toFixed(2)} kg</strong>`;

  let position = (lbm/100)*100;
  if(position>100) position=100;

  bmiIndicator.style.left = `${position}%`;
  bmiIndicator.style.display = "block";
}
</script>
</body>
</html>
