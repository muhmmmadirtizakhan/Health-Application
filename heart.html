<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Heart Rate Zones - Health Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}
body {
  height: 100vh;
  background: url('https://as1.ftcdn.net/jpg/02/02/82/52/1000_F_202825299_YkEAeJqjSniTNyhvg6uW8O99iY5nUNdt.jpg') no-repeat center center fixed;
  background-size: cover;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  padding-top: 50px;
  position: relative;
}
.back-btn {
  position: fixed;
  top: 15px;
  left: 15px;
  background: rgba(0,0,0,0.7);
  color: white;
  border: none;
  border-radius: 20px;
  padding: 8px 15px;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  z-index: 1000;
}
.back-btn:hover {
  background: rgba(0,0,0,0.7);
}
.back-btn i {
  margin-right: 5px;
}
.container {
  background: rgba(0,0,0,0.1); /* Lighter glass */
  backdrop-filter: blur(15px);
  display: flex;
  flex-direction: row;
  width: 90%;
  max-width: 900px;
  border-radius: 20px;
  box-shadow: 0 0 30px rgba(0,0,0,0.6);
  overflow: hidden;
  margin-top: 20px;
}
.left {
  flex: 1;
  padding: 40px;
}
.left h2 {
  margin-bottom: 20px;
  text-align: center;
}
label {
  display: block;
  margin-top: 15px;
  font-size: 16px;
}
input {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  border: none;
  border-radius: 8px;
  background-color: rgba(255,255,255,0.2);
  color: white;
  font-size: 16px;
}
button {
  width: 100%;
  margin-top: 25px;
  padding: 12px;
  font-size: 16px;
  border: none;
  border-radius: 25px;
  background-color: #00bfff;
  color: white;
  cursor: pointer;
  transition: background-color 0.3s;
}
button:hover {
  background-color: #008ecc;
}
.right {
  flex: 1;
  padding: 40px;
  display: flex;
  flex-direction: column;
  background: rgba(255,255,255,0.05);
}
.result {
  font-size: 22px;
  margin-bottom: 15px;
  text-align: center;
  min-height: 120px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.bmi-scale {
  width: 100%;
  height: 20px;
  background: linear-gradient(to right, 
    #00ffcc 0%, 
    #00ff00 25%, 
    #ffaa00 50%, 
    #ff0000 75%);
  border-radius: 10px;
  margin: 15px 0;
  position: relative;
}
.bmi-indicator {
  position: absolute;
  top: -10px;
  width: 3px;
  height: 40px;
  background-color: white;
  transform: translateX(-50%);
  display: none;
}
.categories {
  width: 100%;
  border-top: 1px solid rgba(255,255,255,0.2);
  padding-top: 15px;
}
.categories h3 {
  margin-bottom: 10px;
  text-align: center;
  font-size: 18px;
}
.category-list {
  list-style-type: none;
  padding: 0 10px;
}
.category-list li {
  margin-bottom: 5px;
  font-size: 14px;
}
@media(max-width: 768px){
  .container {
    flex-direction: column;
  }
  .left, .right {
    padding: 30px;
  }
  .back-btn {
    top: 10px;
    left: 10px;
    padding: 6px 12px;
    font-size: 12px;
  }
}
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<button class="back-btn" onclick="window.location.href='hanannanana.html'">
  <i class="fas fa-arrow-left"></i> Dashboard
</button>
<div class="container">
  <div class="left">
    <h2>Heart Rate Zones</h2>
    <label>Age:</label>
    <input type="number" id="age" placeholder="e.g. 30">
    <button onclick="calculateHeartRate()">Calculate Zones</button>
  </div>
  <div class="right">
    <div class="result" id="result">Enter your age to calculate zones</div>
    <div class="bmi-scale" id="bmiScale">
      <div class="bmi-indicator" id="bmiIndicator"></div>
    </div>
    <div class="categories">
      <h3>Heart Rate Zones:</h3>
      <ul class="category-list" id="zonesList">
        <!-- Zones will appear here -->
      </ul>
    </div>
  </div>
</div>
<script>
function calculateHeartRate(){
  const age = parseInt(document.getElementById("age").value);
  const resultDiv = document.getElementById("result");
  const bmiIndicator = document.getElementById("bmiIndicator");
  const zonesList = document.getElementById("zonesList");
  
  if(!age || age <=0){
    resultDiv.textContent = "Please enter a valid age!";
    bmiIndicator.style.display = "none";
    zonesList.innerHTML = "";
    return;
  }
  
  const maxHR = 220 - age;
  const zones = [
    {name:"Zone 1 (Very Light)", min:maxHR*0.5, max:maxHR*0.6},
    {name:"Zone 2 (Light - Fat Burn)", min:maxHR*0.6, max:maxHR*0.7},
    {name:"Zone 3 (Moderate - Cardio)", min:maxHR*0.7, max:maxHR*0.8},
    {name:"Zone 4 (Hard - Anaerobic)", min:maxHR*0.8, max:maxHR*0.9},
    {name:"Zone 5 (Maximum Effort)", min:maxHR*0.9, max:maxHR}
  ];

  resultDiv.innerHTML = `
    <div>Your Max Heart Rate: <strong>${maxHR} bpm</strong></div>
  `;

  // Populate the list
  zonesList.innerHTML = "";
  zones.forEach(zone=>{
    zonesList.innerHTML += `<li>${zone.name}: ${zone.min.toFixed(0)}-${zone.max.toFixed(0)} bpm</li>`;
  });

  // Indicator position (relative to 200 bpm scale)
  let position = (maxHR/200)*100;
  if(position>100) position=100;
  bmiIndicator.style.left = `${position}%`;
  bmiIndicator.style.display = "block";
}
</script>
</body>
</html>
