<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Daily Water Requirement - Health Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}
body {
  height: 100vh;
  background: url('brotwhr.jpg') no-repeat center center fixed;
  background-size: cover;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  padding-top: 50px;
  position: relative;
}
.back-btn {
  position: fixed;
  top: 15px;
  left: 15px;
  background: rgba(0,0,0,0.7);
  color: white;
  border: none;
  border-radius: 20px;
  padding: 8px 15px;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  z-index: 1000;
}
.back-btn:hover {
  background: rgba(0,0,0,0.8);
}
.back-btn i {
  margin-right: 5px;
}
.container {
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(15px);
  display: flex;
  flex-direction: row;
  width: 95%;
  max-width: 990px;
  height: 470px;
  border-radius: 20px;
  box-shadow: 0 0 30px rgba(0,0,0,0.6);
  overflow: hidden;
  margin-top: 20px;
}
.left {
  flex: 1;
  padding: 40px;
}
.left h2 {
  margin-bottom: 20px;
  text-align: center;
}
label {
  display: block;
  margin-top: 15px;
  font-size: 16px;
}
input {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  border: none;
  border-radius: 8px;
  background-color: rgba(0,0,0,0.7);
  color: white;
  font-size: 16px;
}
button {
  width: 100%;
  margin-top: 25px;
  padding: 12px;
  font-size: 16px;
  border: none;
  border-radius: 25px;
  background-color: #00bfff;
  color: white;
  cursor: pointer;
  transition: background-color 0.3s;
}
button:hover {
  background-color: #008ecc;
}
.right {
  flex: 1;
  padding: 40px;
  display: flex;
  flex-direction: column;
  background: rgba(255,255,255,0.05);
}
.result {
  font-size: 22px;
  margin-bottom: 15px;
  text-align: center;
  min-height: 120px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.bmi-scale {
  width: 100%;
  height: 20px;
  background: linear-gradient(to right, 
    #00ffcc 0%, 
    #00ff00 25%, 
    #ffaa00 50%, 
    #ff0000 75%);
  border-radius: 10px;
  margin: 15px 0;
  position: relative;
}
.bmi-indicator {
  position: absolute;
  top: -10px;
  width: 3px;
  height: 40px;
  background-color: white;
  transform: translateX(-50%);
  display: none;
}
.categories {
  width: 100%;
  border-top: 1px solid rgba(255,255,255,0.2);
  padding-top: 15px;
}
.categories h3 {
  margin-bottom: 10px;
  text-align: center;
  font-size: 18px;
}
.category-list {
  list-style-type: none;
  padding: 0 10px;
}
.category-list li {
  margin-bottom: 5px;
  font-size: 14px;
}
@media(max-width: 768px){
  .container {
    flex-direction: column;
  }
  .left, .right {
    padding: 30px;
  }
  .back-btn {
    top: 10px;
    left: 10px;
    padding: 6px 12px;
    font-size: 12px;
  }
}
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<button class="back-btn" onclick="window.location.href='hanannanana.html'">
  <i class="fas fa-arrow-left"></i> Dashboard
</button>
<div class="container">
  <div class="left">
    <h2>Daily Water Requirement</h2>
    <label>Weight (kg):</label>
    <input type="number" id="weight" placeholder="e.g. 70">
    <label>Exercise Time per Day (minutes):</label>
    <input type="number" id="exercise" placeholder="e.g. 30">
    <button onclick="calculateWater()">Calculate Requirement</button>
  </div>
  <div class="right">
    <div class="result" id="result">Enter your details to calculate</div>
    <div class="bmi-scale" id="bmiScale">
      <div class="bmi-indicator" id="bmiIndicator"></div>
    </div>
    <div class="categories">
      <h3>General Recommendations:</h3>
      <ul class="category-list">
        <li>1.5–2 liters/day for low activity</li>
        <li>2–2.5 liters/day for moderate activity</li>
        <li>2.5–3+ liters/day for high activity</li>
      </ul>
    </div>
  </div>
</div>
<script>
function calculateWater(){
  const weight = parseFloat(document.getElementById("weight").value);
  const exercise = parseFloat(document.getElementById("exercise").value);
  const resultDiv = document.getElementById("result");
  const bmiIndicator = document.getElementById("bmiIndicator");

  if(!weight){
    resultDiv.textContent = "Please enter your weight!";
    bmiIndicator.style.display = "none";
    return;
  }

  const water = (weight * 35 + exercise * 12) / 1000;

  let position = (water/4)*100;
  if(position > 100) position = 100;

  resultDiv.innerHTML = `
    <div>Estimated Daily Water Intake: <strong>${water.toFixed(2)} liters</strong></div>
  `;

  bmiIndicator.style.left = `${position}%`;
  bmiIndicator.style.display = "block";
}
</script>
</body>
</html>
