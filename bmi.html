<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BMI Calculator - Health Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      background-image: url('/huge.jpg');
      background-size: cover;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      padding-top: 50px; /* Added for back button */
      position: relative;
    }

    .back-btn {
      position: fixed; /* Changed from absolute to fixed */
      top: 15px;
      left: 15px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: none;
      border-radius: 20px;
      padding: 8px 15px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.3s;
      display: flex;
      align-items: center;
      z-index: 1000; /* Ensure it stays on top */
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .back-btn i {
      margin-right: 5px;
    }

    .container {
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: row;
      width: 90%;
      max-width: 900px;
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(0,0,0,0.6);
      overflow: hidden;
      margin-top: 20px; /* Added space for back button */
    }

    /* Rest of your existing CSS remains the same */
    .left {
      flex: 1;
      padding: 40px;
    }

    .left h2 {
      margin-bottom: 20px;
      text-align: center;
    }

    label {
      display: block;
      margin-top: 15px;
      font-size: 16px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 5px;
      border: none;
      border-radius: 8px;
      background-color: rgba(255, 255, 255, 0.2);
      color: white;
      font-size: 16px;
    }

    button {
      width: 100%;
      margin-top: 25px;
      padding: 12px;
      font-size: 16px;
      border: none;
      border-radius: 25px;
      background-color: #00bfff;
      color: white;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #008ecc;
    }

    .right {
      flex: 1;
      padding: 40px;
      display: flex;
      flex-direction: column;
      background: rgba(255, 255, 255, 0.05);
    }

    .result {
      font-size: 22px;
      margin-bottom: 15px;
      text-align: center;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .bmi-scale {
      width: 100%;
      height: 20px;
      background: linear-gradient(to right, 
        #00ffcc 0%, 
        #00ff00 25%, 
        #ffaa00 50%, 
        #ff0000 75%);
      border-radius: 10px;
      margin: 15px 0;
      position: relative;
    }

    .bmi-indicator {
      position: absolute;
      top: -10px;
      width: 3px;
      height: 40px;
      background-color: white;
      transform: translateX(-50%);
      display: none;
    }

    .categories {
      width: 100%;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
      padding-top: 15px;
    }
    
    .categories h3 {
      margin-bottom: 10px;
      text-align: center;
      font-size: 18px;
    }
    
    .category-list {
      list-style-type: none;
      padding: 0 10px;
    }
    
    .category-list li {
      margin-bottom: 5px;
      font-size: 14px;
    }

    @media(max-width: 768px) {
      .container {
        flex-direction: column;
      }
      .left, .right {
        padding: 30px;
      }
      .back-btn {
        top: 10px;
        left: 10px;
        padding: 6px 12px;
        font-size: 12px;
      }
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <!-- Back Button - Now fixed at top -->
  <button class="back-btn" onclick="window.location.href='hanannanana.html'">
    <i class="fas fa-arrow-left"></i> Dashboard
  </button>

  <div class="container">
    <div class="left">
      <h2>BMI Calculator</h2>
      <label for="weight">Weight (kg):</label>
      <input type="number" id="weight" placeholder="e.g. 65">

      <label for="height">Height (meters):</label>
      <input type="number" id="height" placeholder="e.g. 1.75">

      <button onclick="calculateBMI()">Calculate BMI</button>
    </div>

    <div class="right">
      <div class="result" id="result">Enter your details to calculate BMI</div>
      <div class="bmi-scale" id="bmiScale">
        <div class="bmi-indicator" id="bmiIndicator"></div>
      </div>
      <div class="categories">
        <h3>BMI Categories:</h3>
        <ul class="category-list">
          <li>Underweight: Less than 18.5</li>
          <li>Normal Weight: 18.5 – 24.9</li>
          <li>Overweight: 25 – 29.9</li>
          <li>Obese (Class I): 30 – 34.9</li>
          <li>Obese (Class II): 35 – 39.9</li>
          <li>Obese (Class III): 40 or greater</li>
        </ul>
      </div>
    </div>
  </div>

  <script>
    function calculateBMI() {
      const weight = parseFloat(document.getElementById("weight").value);
      const height = parseFloat(document.getElementById("height").value);
      const resultDiv = document.getElementById("result");
      const bmiIndicator = document.getElementById("bmiIndicator");

      if (!weight || !height || height <= 0) {
        resultDiv.textContent = "Please enter valid values!";
        bmiIndicator.style.display = "none";
        return;
      }

      const bmi = weight / (height * height);
      let category = "";
      let advice = "";

      if (bmi < 18.5) {
        category = "Underweight";
        advice = "You are in the underweight range. Consider consulting a healthcare professional.";
      } else if (bmi < 25) {
        category = "Normal Weight";
        advice = "You are in the healthy weight range. Maintain your lifestyle!";
      } else if (bmi < 30) {
        category = "Overweight";
        advice = "You are in the overweight range. Consider consulting a healthcare professional.";
      } else {
        category = "Obese";
        advice = "You are in the obese range. Please consult a healthcare professional.";
      }

      let position = (bmi / 40) * 100;
      if (position > 100) position = 100;
      
      resultDiv.innerHTML = `
        <div>Your BMI: <strong>${bmi.toFixed(2)}</strong></div>
        <div>Category: <strong>${category}</strong></div>
        <div style="margin-top:10px">${advice}</div>
      `;
      
      bmiIndicator.style.left = `${position}%`;
      bmiIndicator.style.display = "block";
    }
  </script>
</body>
</html>
