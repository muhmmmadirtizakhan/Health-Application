<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Waist-to-Height Ratio - Health Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}
body {
  height: 100vh;
  background: url('https://cf-images.eu-west-1.prod.boltdns.net/v1/static/79855382001/37c278a1-aae2-4a9b-9186-f506781ba57b/6f70f61c-7e65-4d76-8dec-766cfa834605/1280x720/match/image.jpg') no-repeat center center fixed;
  background-size: cover;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  padding-top: 50px;
  position: relative;
}
.back-btn {
  position: fixed;
  top: 15px;
  left: 15px;
  background: rgba(0,0,0,0.7);
  color: white;
  border: none;
  border-radius: 20px;
  padding: 8px 15px;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  z-index: 1000;
}
.back-btn:hover {
  background: rgba(0,0,0,0.8);
}
.back-btn i {
  margin-right: 5px;
}
.container {
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(15px);
  display: flex;
  flex-direction: row;
  width: 90%;
  max-width: 900px;
  border-radius: 20px;
  box-shadow: 0 0 30px rgba(0,0,0,0.6);
  overflow: hidden;
  margin-top: 20px;
}
.left {
  flex: 1;
  padding: 40px;
}
.left h2 {
  margin-bottom: 20px;
  text-align: center;
}
label {
  display: block;
  margin-top: 15px;
  font-size: 16px;
}
input,
select {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  border: none;
  border-radius: 8px;
  background-color: rgba(0,0,0,0.7);
  color: white;
  font-size: 16px;
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg fill='white' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>");
  background-repeat: no-repeat;
  background-position: right 10px center;
  background-size: 16px;
  padding-right: 30px;
}
button {
  width: 100%;
  margin-top: 25px;
  padding: 12px;
  font-size: 16px;
  border: none;
  border-radius: 25px;
  background-color: #00bfff;
  color: white;
  cursor: pointer;
  transition: background-color 0.3s;
}
button:hover {
  background-color: #008ecc;
}
.right {
  flex: 1;
  padding: 40px;
  display: flex;
  flex-direction: column;
  background: rgba(255,255,255,0.05);
}
.result {
  font-size: 22px;
  margin-bottom: 15px;
  text-align: center;
  min-height: 120px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.bmi-scale {
  width: 100%;
  height: 20px;
  background: linear-gradient(to right, 
    #00ffcc 0%, 
    #00ff00 25%, 
    #ffaa00 50%, 
    #ff0000 75%);
  border-radius: 10px;
  margin: 15px 0;
  position: relative;
}
.bmi-indicator {
  position: absolute;
  top: -10px;
  width: 3px;
  height: 40px;
  background-color: white;
  transform: translateX(-50%);
  display: none;
}
.categories {
  width: 100%;
  border-top: 1px solid rgba(255,255,255,0.2);
  padding-top: 15px;
}
.categories h3 {
  margin-bottom: 10px;
  text-align: center;
  font-size: 18px;
}
.category-list {
  list-style-type: none;
  padding: 0 10px;
}
.category-list li {
  margin-bottom: 5px;
  font-size: 14px;
}
@media(max-width: 768px){
  .container {
    flex-direction: column;
  }
  .left, .right {
    padding: 30px;
  }
  .back-btn {
    top: 10px;
    left: 10px;
    padding: 6px 12px;
    font-size: 12px;
  }
}
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<button class="back-btn" onclick="window.location.href='hanannanana.html'">
  <i class="fas fa-arrow-left"></i> Dashboard
</button>
<div class="container">
  <div class="left">
    <h2>Waist-to-Height Ratio</h2>
    <label>Gender:</label>
    <select id="gender">
      <option value="male">Male</option>
      <option value="female">Female</option>
    </select>
    <label>Waist Circumference (meters):</label>
    <input type="number" id="waist" placeholder="e.g. 0.85">
    <label>Height (meters):</label>
    <input type="number" id="height" placeholder="e.g. 1.75">
    <button onclick="calculateRatio()">Calculate Ratio</button>
  </div>
  <div class="right">
    <div class="result" id="result">Enter your details to calculate Ratio</div>
    <div class="bmi-scale" id="bmiScale">
      <div class="bmi-indicator" id="bmiIndicator"></div>
    </div>
    <div class="categories">
      <h3>Interpretation Categories:</h3>
      <ul class="category-list" id="categoriesList"></ul>
    </div>
  </div>
</div>
<script>
function calculateRatio(){
  const gender = document.getElementById("gender").value;
  const waist = parseFloat(document.getElementById("waist").value);
  const height = parseFloat(document.getElementById("height").value);
  const resultDiv = document.getElementById("result");
  const bmiIndicator = document.getElementById("bmiIndicator");
  const categoriesList = document.getElementById("categoriesList");

  if(!waist || !height){
    resultDiv.textContent = "Please enter valid values!";
    bmiIndicator.style.display = "none";
    categoriesList.innerHTML = "";
    return;
  }

  const ratio = waist / height;

  let category = "";
  let position = ratio * 100;
  if(position > 100) position = 100;

  if(gender === "male"){
    if (ratio < 0.35) category = "Extremely Slim";
    else if (ratio < 0.43) category = "Slender/Healthy";
    else if (ratio < 0.52) category = "Healthy";
    else if (ratio < 0.57) category = "Overweight";
    else if (ratio < 0.62) category = "Very Overweight";
    else category = "Obese";
  }else{
    if (ratio < 0.35) category = "Extremely Slim";
    else if (ratio < 0.42) category = "Slender/Healthy";
    else if (ratio < 0.48) category = "Healthy";
    else if (ratio < 0.53) category = "Overweight";
    else if (ratio < 0.57) category = "Very Overweight";
    else category = "Obese";
  }

  resultDiv.innerHTML = `
    <div>Your Waist-to-Height Ratio: <strong>${ratio.toFixed(2)}</strong></div>
    <div>Category: ${category}</div>
  `;

  bmiIndicator.style.left = `${position}%`;
  bmiIndicator.style.display = "block";

  categoriesList.innerHTML = `
    <li>Extremely Slim: &lt;0.35</li>
    <li>Slender/Healthy: 0.35–0.43 (M) / 0.35–0.42 (F)</li>
    <li>Healthy: 0.43–0.52 (M) / 0.42–0.48 (F)</li>
    <li>Overweight: 0.52–0.57 (M) / 0.48–0.53 (F)</li>
    <li>Very Overweight: 0.57–0.62 (M) / 0.53–0.57 (F)</li>
    <li>Obese: &gt;0.62 (M) / &gt;0.57 (F)</li>
  `;
}
</script>
</body>
</html>
